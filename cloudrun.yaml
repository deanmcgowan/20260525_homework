apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: stormaktstiden-app
  labels:
    cloud.googleapis.com/location: europe-north1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: europe-north1-docker.pkg.dev/PROJECT_ID/stormaktstiden/app:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
